<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nebula PCAP Visualizer</title>
    <style>
      body {
        margin: 0;
        background: #050505;
        color: #fff;
        font-family: "Inter", sans-serif;
        overflow: hidden;
      }
      canvas {
        display: block;
      }
      #ui {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 80%;
        background: rgba(20, 20, 20, 0.8);
        padding: 15px;
        border-radius: 10px;
        backdrop-filter: blur(5px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      #viewport-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(600px, 1fr));
        gap: 10px;
        padding: 10px;
        width: 100%;
        height: calc(100vh - 120px);
        overflow-y: auto;
        box-sizing: border-box;
      }
      .view-container {
        width: 100%;
        height: 400px;
        background: transparent;
        border: 1px solid #333;
        position: relative;
        border-radius: 8px;
        overflow: hidden;
      }
      .view-label {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(0, 0, 0, 0.5);
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 12px;
        pointer-events: none;
        z-index: 10;
      }
      #controls {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 80%;
        background: rgba(0, 0, 0, 0.8);
        padding: 15px;
        border-radius: 12px;
        border: 1px solid #333;
        z-index: 100;
      }
      #slider {
        width: 100%;
        cursor: pointer;
      }
      #info {
        position: absolute;
        top: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.5);
        padding: 10px;
        border-radius: 5px;
      }
      .label {
        font-size: 12px;
        margin-bottom: 5px;
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <div id="ui">
      <div class="label" id="status">Loading project metadata...</div>
      <div class="label" id="camera-view">VIEW: pos(0,0,50) target(0,0,0)</div>
    </div>

    <!-- Main Grid for Sensor Viewports -->
    <div id="viewport-grid"></div>
    <div
      id="canvas-container"
      style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        pointer-events: none;
      "
    ></div>

    <div id="controls">
      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 10px;
        "
      >
        <div class="label">
          FRAME: <span id="frame-num">0</span> /
          <span id="total-frames">0</span>
        </div>
        <div
          class="label"
          id="camera-view"
          style="
            font-family: monospace;
            font-size: 10px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
          "
          title="Click to copy view command"
        >
          VIEW: pos(0,0,0) target(0,0,0)
        </div>
      </div>
      <input type="range" id="slider" min="0" max="0" value="0" />
    </div>

    <!-- Three.js from CDN -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
